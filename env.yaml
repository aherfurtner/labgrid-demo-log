imports:
  - ./labgrid_addons/localshell.py

# Same as env.yaml, but with the ManualPowerDriver enabled and ExternalPowerDriver
# removed to allow for manual power control during testing.
targets:
  main:
    resources:
      RawSerialPort:
        port: "/dev/ttyUSB0"
        speed: 115200

    drivers:
      SerialDriver: {}

      ShellDriver:
        prompt: '(?:\x1b\[\?2004[hl])*root@.+:.*# '
        login_prompt: 'login:'
        username: 'root'
        password: ''

      LocalShellDriver: {}
